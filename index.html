<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ทลข.กพ.ทอ. - กำลังโหลด...</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#ff6600">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,102,0,0.2);
            border-top: 4px solid #ff6600;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        p { color: rgba(255,255,255,0.6); font-size: 14px; }
    </style>
    <script>
        window.location.replace("https://script.google.com/macros/s/AKfycbxfpLhxrfO5JoNuFw5aA71ZYfD7Tmds4PiJCED8vHfDGVgEfp5IlMX2l-12V2SKfBaxnw/exec");
    </script>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>กำลังโหลด...</p>
    </div>
</body>
</html>
